process.roles=broker,controller
node.id=1
controller.quorum.bootstrap.servers=127.0.0.1:9093
controller.quorum.voters=1@127.0.0.1:9093

log.dirs=/tmp/kraft-combined-logs

listeners=BROKER://:9092,CONTROLLER://:9093
advertised.listeners=BROKER://:9092
listener.security.protocol.map=BROKER:SASL_PLAINTEXT,CONTROLLER:SASL_PLAINTEXT
security.protocol=SASL_PLAINTEXT
sasl.enabled.mechanisms=PLAIN,GSSAPI

inter.broker.listener.name=BROKER
controller.listener.names=CONTROLLER

sasl.enabled.mechanisms=PLAIN
sasl.mechanism.controller.protocol=PLAIN
sasl.mechanism.inter.broker.protocol=PLAIN
sasl.mechanism=PLAIN

authorizer.class.name=com.teragrep.kaf_04.TeragrepKafkaAuthorizer

allow.everyone.if.no.acl.found=false
super.users=User:admin

listener.name.broker.plain.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username="admin" password="admin" user_admin="admin";
listener.name.broker.plain.client.auth=required
listener.name.controller.plain.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username="admin" password="admin" user_admin="admin";
listener.name.controller.plain.client.auth=required
