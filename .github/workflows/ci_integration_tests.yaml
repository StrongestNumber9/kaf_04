name: Build and run integration tests

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

defaults:
  run:
    working-directory: ./src/test/integration

jobs:
  run_integration_tests:
    name: Run integration tests
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: artifact
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: rpm

      - name: Download latest kaf_06 rpm
        run: gh release download release --repo teragrep/kaf_06 --dir rpm/
        env:
          GH_TOKEN: ${{ secrets.GH_API_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2.5.0

      - name: Build integration test image
        run: docker buildx build --output type=docker --tag integration-test:latest  .

      - name: Run integration tests
        run: docker run --interactive integration-test:latest
